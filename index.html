<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Bird Bingo</title>
<style>
:root{--bg:#f7f8fb;--panel:#fff;--text:#14161a;--muted:#6f7580;--line:#e4e7ec;--gold:#e9aa00;--blue:#2463eb;--blue2:#315eea;--danger:#df2626;--shadow:0 10px 30px rgba(20,24,35,.09)}
html[data-theme="dark"]{--bg:#111318;--panel:#1b1e25;--text:#f5f6f8;--muted:#a8afba;--line:#303540;--gold:#f1b400;--blue:#4f7cff;--blue2:#315eea;--danger:#ff5c5c;--shadow:0 14px 38px rgba(0,0,0,.32)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;transition:.2s background,.2s color}.app{width:min(100%,1040px);margin:auto;padding:20px clamp(16px,3vw,28px) 40px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px;font-size:clamp(28px,5vw,46px);font-weight:850;letter-spacing:-.04em}.brand-icon{font-size:.9em}.theme-toggle{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:10px 14px;display:flex;align-items:center;gap:9px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;text-align:center;font-size:18px;box-shadow:var(--shadow)}.stat strong{font-size:24px}.remaining strong{color:#11a33a}.drawn strong{color:var(--blue)}.game{max-width:620px;margin:auto}.current-wrap{aspect-ratio:1/1;display:grid;place-items:center;margin-bottom:18px}.current-card{width:100%;height:100%;background:#fff;border:7px solid var(--gold);border-radius:17px;padding:10px;box-shadow:var(--shadow);overflow:hidden}.current-card.empty{display:grid;place-items:center;color:#7b8089;background:var(--panel);border-style:dashed}.current-card img{width:100%;height:100%;display:block;object-fit:contain;background:#fff}.controls{display:grid;gap:13px}.btn{width:100%;border:0;border-radius:15px;padding:16px;font-size:19px;font-weight:800;cursor:pointer;box-shadow:var(--shadow)}.draw-btn{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white}.draw-btn:disabled{opacity:.5;cursor:not-allowed}.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line)}.reset{background:transparent;color:var(--danger);border:2px solid var(--danger);box-shadow:none}.history{margin-top:24px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.history-head{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}.history h2{font-size:21px;margin:0}.history-empty{text-align:center;color:var(--muted);padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:12px;margin-top:16px}.thumb{border:3px solid var(--gold);border-radius:10px;background:#fff;padding:4px;aspect-ratio:1/1;overflow:hidden;cursor:pointer}.thumb img{width:100%;height:100%;display:block;object-fit:contain;background:#fff}.hidden{display:none!important}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:20px;z-index:50}.modal-card{width:min(92vw,560px);background:#fff;border:7px solid var(--gold);border-radius:18px;padding:10px;box-shadow:0 24px 70px rgba(0,0,0,.4)}.modal-card img{width:100%;display:block}.close{position:fixed;top:16px;right:16px;border:0;border-radius:999px;width:44px;height:44px;font-size:24px;background:white;cursor:pointer}.game-over{text-align:center;font-size:24px;font-weight:850;color:var(--gold);margin:12px 0}.footer-note{text-align:center;color:var(--muted);font-size:13px;margin-top:18px}@media(max-width:620px){.app{padding-top:14px}.brand{font-size:31px}.theme-toggle span:last-child{display:none}.stats{gap:9px}.stat{padding:11px 8px;font-size:15px}.stat strong{font-size:20px}.current-card{border-width:5px;padding:6px}.btn{padding:15px;font-size:18px}.grid{grid-template-columns:repeat(3,1fr);gap:9px}.history{padding:14px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><span class="brand-icon">🐦</span><span>Bird Bingo</span></div><button id="themeBtn" class="theme-toggle" aria-label="Toggle dark mode"><span id="themeIcon">☀️</span><span>Dark Mode</span></button></header>
<section class="stats"><div class="stat remaining">Remaining: <strong id="remaining">64</strong></div><div class="stat drawn">Drawn: <strong id="drawnCount">0</strong></div></section>
<section class="game">
<div class="current-wrap"><div id="currentCard" class="current-card empty">Press “Draw Bird” to begin</div></div>
<div id="gameOver" class="game-over hidden">All birds have been drawn!</div>
<div class="controls"><button id="drawBtn" class="btn draw-btn">🎲 Draw Bird</button><button id="historyBtn" class="btn secondary">☷ View Drawn Birds (<span id="historyCount">0</span>)</button><button id="resetBtn" class="btn reset">↻ Reset Game</button></div>
</section>
<section id="history" class="history"><div id="historyHead" class="history-head"><h2>Drawn Birds</h2><span id="chevron">⌃</span></div><div id="historyBody"><div id="historyEmpty" class="history-empty">No birds drawn yet!</div><div id="grid" class="grid"></div></div></section>
<div class="footer-note">Progress is saved automatically on this device.</div>
</main>
<div id="modal" class="modal hidden"><button id="closeModal" class="close">×</button><div class="modal-card"><img id="modalImg" alt="Drawn bird"></div></div>
<script>
const BIRDS=[{"name": "American Kestrel", "src": "images/01_01_american_kestrel.jpg"}, {"name": "Andean Cock-of-the-Rock", "src": "images/01_02_andean_cock_of_the_rock.jpg"}, {"name": "Atlantic Puffin", "src": "images/01_03_atlantic_puffin.jpg"}, {"name": "Bald Eagle", "src": "images/01_04_bald_eagle.jpg"}, {"name": "Barn Owl", "src": "images/01_05_barn_owl.jpg"}, {"name": "Blue Coua", "src": "images/01_06_blue_coua.jpg"}, {"name": "Blue-footed Booby", "src": "images/01_07_blue_footed_booby.jpg"}, {"name": "Blue Jay", "src": "images/01_08_blue_jay.jpg"}, {"name": "Blue Tit", "src": "images/02_01_blue_tit.jpg"}, {"name": "Blue Winged Pitta", "src": "images/02_02_blue_winged_pitta.jpg"}, {"name": "Bohemian Waxwing", "src": "images/02_03_bohemian_waxwing.jpg"}, {"name": "Brown Kiwi", "src": "images/02_04_brown_kiwi.jpg"}, {"name": "Brown Pelican", "src": "images/02_05_brown_pelican.jpg"}, {"name": "Bullfinch", "src": "images/02_06_bullfinch.jpg"}, {"name": "California Condor", "src": "images/02_07_california_condor.jpg"}, {"name": "Canada Goose", "src": "images/02_08_canada_goose.jpg"}, {"name": "Common Cuckoo", "src": "images/03_01_common_cuckoo.jpg"}, {"name": "Common Kingfisher", "src": "images/03_02_common_kingfisher.jpg"}, {"name": "Emperor Penguin", "src": "images/03_03_emperor_penguin.jpg"}, {"name": "Emu", "src": "images/03_04_emu.jpg"}, {"name": "Eurasian Blackbird", "src": "images/03_05_eurasian_blackbird.jpg"}, {"name": "European Bee Eater", "src": "images/03_06_european_bee_eater.jpg"}, {"name": "European Goldfinch", "src": "images/03_07_european_goldfinch.jpg"}, {"name": "European Robin", "src": "images/03_08_european_robin.jpg"}, {"name": "European Starling", "src": "images/04_01_european_starling.jpg"}, {"name": "Golden Oriole", "src": "images/04_02_golden_oriole.jpg"}, {"name": "Golden Pheasant", "src": "images/04_03_golden_pheasant.jpg"}, {"name": "Gouldian Finch", "src": "images/04_04_gouldian_finch.jpg"}, {"name": "Great Bustard", "src": "images/04_05_great_bustard.jpg"}, {"name": "Greater Flamingo", "src": "images/04_06_greater_flamingo.jpg"}, {"name": "Grey Heron", "src": "images/04_07_grey_heron.jpg"}, {"name": "Herring Gull", "src": "images/04_08_herring_gull.jpg"}, {"name": "Hoopoe", "src": "images/05_01_hoopoe.jpg"}, {"name": "House Martin", "src": "images/05_02_house_martin.jpg"}, {"name": "House Sparrow", "src": "images/05_03_house_sparrow.jpg"}, {"name": "Laughing Kookaburra", "src": "images/05_04_laughing_kookaburra.jpg"}, {"name": "Lilac-breasted Roller", "src": "images/05_05_lilac_breasted_roller.jpg"}, {"name": "Magnificent Bird Of Paradise", "src": "images/05_06_magnificent_bird_of_paradise.jpg"}, {"name": "Magnificent Frigatebird", "src": "images/05_07_magnificent_frigatebird.jpg"}, {"name": "Magpie", "src": "images/05_08_magpie.jpg"}, {"name": "Mallard", "src": "images/06_01_mallard.jpg"}, {"name": "Mandarin Duck", "src": "images/06_02_mandarin_duck.jpg"}, {"name": "Mute Swan", "src": "images/06_03_mute_swan.jpg"}, {"name": "Northern Cardinal", "src": "images/06_04_northern_cardinal.jpg"}, {"name": "Northern Mockingbird", "src": "images/06_05_northern_mockingbird.jpg"}, {"name": "Ostrich", "src": "images/06_06_ostrich.jpg"}, {"name": "Pied Wagtail", "src": "images/06_07_pied_wagtail.jpg"}, {"name": "Red-billed Oxpecker", "src": "images/06_08_red_billed_oxpecker.jpg"}, {"name": "Red Grouse", "src": "images/07_01_red_grouse.jpg"}, {"name": "Red-headed Woodpecker", "src": "images/07_02_red_headed_woodpecker.jpg"}, {"name": "Red Junglefowl", "src": "images/07_03_red_junglefowl.jpg"}, {"name": "Rhinoceros Hornbill", "src": "images/07_04_rhinoceros_hornbill.jpg"}, {"name": "Ruby-throated Hummingbird", "src": "images/07_05_ruby_throated_hummingbird.jpg"}, {"name": "Saddle-billed Stork", "src": "images/07_06_saddle_billed_stork.jpg"}, {"name": "Scarlet Ibis", "src": "images/07_07_scarlet_ibis.jpg"}, {"name": "Scarlet Macaw", "src": "images/07_08_scarlet_macaw.jpg"}, {"name": "Shoebill", "src": "images/08_01_shoebill.jpg"}, {"name": "Splendid Fairywren", "src": "images/08_02_splendid_fairywren.jpg"}, {"name": "Superb Lyrebird", "src": "images/08_03_superb_lyrebird.jpg"}, {"name": "Toco Toucan", "src": "images/08_04_toco_toucan.jpg"}, {"name": "Turtle Dove", "src": "images/08_05_turtle_dove.jpg"}, {"name": "Vulturine Guineafowl", "src": "images/08_06_vulturine_guineafowl.jpg"}, {"name": "Wandering Albatross", "src": "images/08_07_wandering_albatross.jpg"}, {"name": "Wild Turkey", "src": "images/08_08_wild_turkey.jpg"}];
const STORAGE='bird-bingo-state-v3';
let state={remaining:BIRDS.map((_,i)=>i),drawn:[],current:null};
const $=s=>document.querySelector(s);
const els={remaining:$('#remaining'),drawnCount:$('#drawnCount'),historyCount:$('#historyCount'),current:$('#currentCard'),drawBtn:$('#drawBtn'),reset:$('#resetBtn'),historyBtn:$('#historyBtn'),history:$('#history'),historyBody:$('#historyBody'),historyHead:$('#historyHead'),chevron:$('#chevron'),empty:$('#historyEmpty'),grid:$('#grid'),over:$('#gameOver'),theme:$('#themeBtn'),themeIcon:$('#themeIcon'),modal:$('#modal'),modalImg:$('#modalImg'),close:$('#closeModal')};
function save(){localStorage.setItem(STORAGE,JSON.stringify(state))}
function load(){try{const x=JSON.parse(localStorage.getItem(STORAGE));if(x&&Array.isArray(x.remaining)&&Array.isArray(x.drawn))state=x}catch(e){}}
function cardImg(bird){const img=document.createElement('img');img.src=bird.src;img.alt=bird.name;return img}
function render(){els.remaining.textContent=state.remaining.length;els.drawnCount.textContent=state.drawn.length;els.historyCount.textContent=state.drawn.length;els.drawBtn.disabled=!state.remaining.length;els.over.classList.toggle('hidden',state.remaining.length>0);
els.current.innerHTML='';els.current.classList.toggle('empty',state.current===null);if(state.current===null)els.current.textContent='Press “Draw Bird” to begin';else els.current.append(cardImg(BIRDS[state.current]));
els.grid.innerHTML='';els.empty.classList.toggle('hidden',state.drawn.length>0);state.drawn.forEach(i=>{const b=BIRDS[i],btn=document.createElement('button');btn.className='thumb';btn.title=b.name;btn.append(cardImg(b));btn.onclick=()=>openModal(b);els.grid.append(btn)});save()}
function draw(){if(!state.remaining.length)return;const pick=Math.floor(Math.random()*state.remaining.length);const i=state.remaining.splice(pick,1)[0];state.drawn.unshift(i);state.current=i;render();if(navigator.vibrate)navigator.vibrate(35)}
function reset(){if(state.drawn.length&&!confirm('Restart the game and return all birds to the pool?'))return;state={remaining:BIRDS.map((_,i)=>i),drawn:[],current:null};render()}
function toggleHistory(){const hidden=els.historyBody.classList.toggle('hidden');els.chevron.textContent=hidden?'⌄':'⌃';if(!hidden)els.history.scrollIntoView({behavior:'smooth',block:'start'})}
function openModal(b){els.modalImg.src=b.src;els.modalImg.alt=b.name;els.modal.classList.remove('hidden')}
function closeModal(){els.modal.classList.add('hidden')}
function setTheme(t){document.documentElement.dataset.theme=t;localStorage.setItem('bird-bingo-theme',t);els.themeIcon.textContent=t==='dark'?'🌙':'☀️';document.querySelector('meta[name=theme-color]').content=t==='dark'?'#111318':'#ffffff'}
els.drawBtn.onclick=draw;els.reset.onclick=reset;els.historyBtn.onclick=()=>{if(els.historyBody.classList.contains('hidden'))toggleHistory();els.history.scrollIntoView({behavior:'smooth'})};els.historyHead.onclick=toggleHistory;els.theme.onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');els.close.onclick=closeModal;els.modal.onclick=e=>{if(e.target===els.modal)closeModal()};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if((e.key===' '||e.key==='Enter')&&e.target===document.body){e.preventDefault();draw()}});
load();setTheme(localStorage.getItem('bird-bingo-theme')||'light');render();
</script>
</body></html>
